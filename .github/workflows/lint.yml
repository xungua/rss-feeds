name: Lint

on:
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Lint and format check
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .
