name: Run Feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: request-feeds
  cancel-in-progress: true

jobs:
  run-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies and run feeds
        timeout-minutes: 20
        run: |
          set -e
          uv sync
          uv run feed_generators/run_all_feeds.py --skip-selenium

      - name: Commit and push feeds
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feeds/*.xml
          git stash
          git pull --rebase || { echo "Rebase failed, aborting and retrying with merge"; git rebase --abort 2>/dev/null; git pull; }
          git stash pop || true
          git add feeds/*.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'Update RSS feeds'
            git push || { git pull --rebase && git push; }
          fi
